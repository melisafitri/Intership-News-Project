<svg width="200" height="190" viewBox="0 0 200 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gfl-blue" x1="50" y1="40" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d1ff"/>
      <stop offset="1" stop-color="#0a86ff"/>
    </linearGradient>
    <linearGradient id="gfl-amber" x1="120" y1="112" x2="152" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffcf5c"/>
      <stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- awan / blob cyan lembut -->
  <ellipse cx="100" cy="100" rx="82" ry="56" fill="#e6f6ff"/>
  <ellipse cx="74" cy="82" rx="46" ry="38" fill="#d6eefd"/>
  <ellipse cx="132" cy="90" rx="42" ry="34" fill="#d6eefd"/>
  <path d="M32 128 C60 150 140 150 170 122" stroke="#8fd8ff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- garis gerak (motion) -->
  <line x1="16" y1="92" x2="30" y2="92" stroke="#7fd2ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="20" y1="108" x2="32" y2="108" stroke="#7fd2ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="172" y1="72" x2="186" y2="72" stroke="#7fd2ff" stroke-width="5" stroke-linecap="round"/>

  <!-- lembar berita / koran -->
  <rect x="60" y="46" width="80" height="94" rx="10" fill="#ffffff" stroke="url(#gfl-blue)" stroke-width="6"/>
  <!-- blok gambar -->
  <rect x="72" y="58" width="32" height="24" rx="4" fill="#d6eefd" stroke="url(#gfl-blue)" stroke-width="2"/>
  <!-- garis judul di samping gambar -->
  <line x1="112" y1="62" x2="128" y2="62" stroke="#a5dbfb" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="71" x2="128" y2="71" stroke="#a5dbfb" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="80" x2="124" y2="80" stroke="#a5dbfb" stroke-width="4" stroke-linecap="round"/>
  <!-- garis isi -->
  <line x1="72" y1="96" x2="128" y2="96" stroke="#a5dbfb" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="106" x2="128" y2="106" stroke="#a5dbfb" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="116" x2="106" y2="116" stroke="#a5dbfb" stroke-width="4" stroke-linecap="round"/>

  <!-- badge peringatan -->
  <circle cx="136" cy="128" r="17" fill="url(#gfl-amber)"/>
  <line x1="136" y1="120" x2="136" y2="131" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="136" cy="137" r="2.2" fill="#ffffff"/>
</svg>
